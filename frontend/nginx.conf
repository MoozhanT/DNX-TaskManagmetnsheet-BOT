server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10M;

    # فایل‌های استاتیک فرانت (index.html، جاوااسکریپت، css و ...)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # درخواست‌های API به سرویس backend (نام سرویس در docker-compose.yml) پراکسی می‌شوند
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # نمایش زنده‌ی فایل دیتابیس (فقط خواندنی) — فقط با یوزر/پسورد مجاز
    location /db-viewer/ {
        auth_basic "دسترسی محدود";
        auth_basic_user_file /etc/nginx/db-viewer.htpasswd;
        proxy_pass http://db-viewer:8080/db-viewer/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
