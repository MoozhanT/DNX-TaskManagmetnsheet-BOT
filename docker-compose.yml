services:
  backend:
    image: dnx-taskbot-backend:latest
    ports:
      # پورت 8001 هاست هم باز است (اختیاری، فقط برای تست مستقیم API/دیدن /docs)
      # (8000 روی این سرور قبلاً توسط پروژه‌ی دیگری اشغال شده)
      - "8001:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      # اگر تلگرام روی این سرور فیلتر باشد، از تانل SOCKS5 سرویس sshproxy عبور می‌کند
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
      # app.db داخل volume ذخیره می‌شود تا با هر rebuild پاک نشود
      DATABASE_URL: sqlite:////app/data/app.db
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  # تانل SSH (SOCKS5 پویا) به یک سرور خارج، فقط وقتی که تلگرام روی سرور اصلی فیلتر باشد لازم است.
  # فقط وقتی فعال می‌شود که COMPOSE_PROFILES=proxy در .env ست شده باشد (نگاه کن به .env.example)
  # چون به یک فایل کلید SSH (./sshproxy/id_ed25519، عمداً در گیت نیست) نیاز دارد.
  sshproxy:
    profiles: ["proxy"]
    build:
      context: ./sshproxy
    environment:
      REMOTE_HOST: ${PROXY_REMOTE_HOST:-}
      REMOTE_USER: ${PROXY_REMOTE_USER:-root}
      SOCKS_PORT: "1080"
    volumes:
      - ./sshproxy/id_ed25519:/run/secrets/tunnel_key:ro
    restart: unless-stopped

  frontend:
    image: dnx-taskbot-frontend:latest
    ports:
      # آدرس اصلی سایت؛ فقط از خودِ سرور در دسترس است، nginx سیستم آن را عمومی می‌کند
      # (8080 روی این سرور قبلاً توسط پروژه‌ی دیگری اشغال شده)
      - "127.0.0.1:8081:80"
    depends_on:
      - backend
      - db-viewer
    restart: unless-stopped

  db-viewer:
    image: dnx-taskbot-db-viewer:latest
    volumes:
      # فقط خواندنی؛ همان فایلی که backend استفاده می‌کند اما بدون اجازه‌ی نوشتن
      - backend_data:/data:ro
    restart: unless-stopped

volumes:
  backend_data:
